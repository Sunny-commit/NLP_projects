<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Description and Resume Matcher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Job Description and Resume Matcher</span>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="card p-4 shadow">
            <form method="POST" enctype="multipart/form-data">
                <h3 class="mb-3">Job Description</h3>
                <textarea name="job_description" class="form-control" rows="5" placeholder="Enter job description here..."></textarea>

                <h3 class="mt-4">Upload Resume</h3>
                <input type="file" name="resume" class="form-control mt-2" accept=".pdf,.docx,.txt">

                <button type="submit" class="btn btn-primary mt-3">Match Resume</button>
            </form>

            {% if match_result %}
            <h3 class="mt-3 text-success">{{ match_result }}</h3>
            {% endif %}
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
